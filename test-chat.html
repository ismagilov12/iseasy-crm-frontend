<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS EASY — Тест AI Агента</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155}
.header h1{font-size:18px;color:#818cf8;font-weight:700}
.header .badge{background:#4f46e5;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.header .status{margin-left:auto;font-size:13px;color:#64748b}
.header .status.online{color:#4ade80}
.config-bar{background:#1e293b;padding:10px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155;font-size:13px;flex-wrap:wrap}
.config-bar label{color:#94a3b8;font-weight:500}
.config-bar input,.config-bar select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:6px 12px;border-radius:8px;font-size:13px}
.config-bar input[type=text]{width:320px}
.chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:4px}
.msg.agent{align-self:flex-start;background:#1e293b;color:#e2e8f0;border-bottom-left-radius:4px;border:1px solid #334155}
.msg.agent .label{font-size:11px;color:#818cf8;font-weight:600;margin-bottom:6px}
.msg.system{align-self:center;background:#334155;color:#94a3b8;font-size:12px;padding:8px 16px;border-radius:12px}
.msg .trace{margin-top:10px;padding-top:10px;border-top:1px solid #33415580;font-size:11px;color:#64748b}
.msg .trace div{padding:2px 0}
.msg .trace .tool{color:#fbbf24}
.msg .trace .ok{color:#4ade80}
.msg .trace .err{color:#f87171}
.msg .meta{margin-top:8px;font-size:11px;color:#475569;display:flex;gap:12px}
.input-bar{background:#1e293b;padding:16px 24px;display:flex;gap:12px;border-top:1px solid #334155}
.input-bar input{flex:1;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:14px 18px;border-radius:14px;font-size:15px;outline:none;transition:border .2s}
.input-bar input:focus{border-color:#4f46e5}
.input-bar button{background:#4f46e5;color:#fff;border:none;padding:14px 28px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.input-bar button:hover{background:#3730a3}
.input-bar button:disabled{background:#475569;cursor:not-allowed}
.typing{align-self:flex-start;padding:14px 18px;background:#1e293b;border-radius:18px;border-bottom-left-radius:4px;border:1px solid #334155}
.typing .dots{display:flex;gap:4px}
.typing .dots span{width:8px;height:8px;background:#4f46e5;border-radius:50%;animation:bounce .6s infinite alternate}
.typing .dots span:nth-child(2){animation-delay:.15s}
.typing .dots span:nth-child(3){animation-delay:.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.clear-btn{background:none;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px}
.clear-btn:hover{background:#334155}
</style>
</head>
<body>

<div class="header">
  <h1>👟 IS EASY AI Agent</h1>
  <span class="badge">TEST MODE</span>
  <span class="status" id="status">Готовий</span>
</div>

<div class="config-bar">
  <label>API:</label>
  <input type="text" id="apiUrl" value="https://iseasy-crm-api.vercel.app">
  <label>Token:</label>
  <input type="text" id="token" value="c225d45f0f88ba5aa9ddb24458fba03ca7952c1f99ba9dbcaca0e309ada94420">
  <label>Ім'я клієнта:</label>
  <input type="text" id="clientName" value="Тестовий клієнт" style="width:180px">
  <button class="clear-btn" onclick="clearChat()">🗑️ Новий діалог</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input type="text" id="input" placeholder="Напишіть як клієнт..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)send()">
  <button id="sendBtn" onclick="send()">Надіслати</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');

let history = [];
let sessionId = 'test_' + Date.now();
let conversationId = null;

function addMsg(role, text, extra) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (role === 'agent') {
    let html = '<div class="label">🤖 AI Agent</div>';
    html += text.replace(/\n/g, '<br>');

    if (extra?.trace?.length) {
      html += '<div class="trace">';
      extra.trace.forEach(t => {
        if (t.type === 'tool_call') {
          html += `<div class="tool">🔧 ${t.tool}(${JSON.stringify(t.input || {}).substring(0, 80)}...)</div>`;
        } else if (t.type === 'tool_result') {
          const preview = typeof t.result === 'string' ? t.result.substring(0, 100) : JSON.stringify(t.result).substring(0, 100);
          html += `<div class="ok">✅ → ${preview}</div>`;
        } else if (t.type === 'error') {
          html += `<div class="err">❌ ${t.error}</div>`;
        }
      });
      html += '</div>';
    }

    if (extra) {
      html += '<div class="meta">';
      if (extra.conversation_id) html += `<span>💬 Conv #${extra.conversation_id}</span>`;
      if (extra.turns_used) html += `<span>🔄 ${extra.turns_used} turns</span>`;
      if (extra.usage) html += `<span>📊 ${extra.usage.input_tokens || 0} in / ${extra.usage.output_tokens || 0} out</span>`;
      if (extra.model) html += `<span>🧠 ${extra.model}</span>`;
      html += '</div>';
    }

    div.innerHTML = html;
  } else if (role === 'system') {
    div.textContent = text;
  } else {
    div.textContent = text;
  }

  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  const apiUrl = document.getElementById('apiUrl').value.trim();
  const token = document.getElementById('token').value.trim();
  const clientName = document.getElementById('clientName').value.trim() || 'Тестовий клієнт';

  if (!token) {
    addMsg('system', '⚠️ Введіть Agent API Token в полі зверху');
    return;
  }

  inputEl.value = '';
  addMsg('user', text);
  history.push({ role: 'user', text });

  sendBtn.disabled = true;
  statusEl.textContent = '⏳ Агент думає...';
  statusEl.className = 'status';
  showTyping();

  const startTime = Date.now();

  try {
    const resp = await fetch(apiUrl + '/api/test-chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        text: text,
        client_name: clientName,
        session_id: sessionId
      })
    });

    hideTyping();

    if (!resp.ok) {
      const errText = await resp.text();
      addMsg('system', `❌ Помилка ${resp.status}: ${errText}`);
      statusEl.textContent = `❌ Помилка ${resp.status}`;
      sendBtn.disabled = false;
      return;
    }

    const data = await resp.json();
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (data.conversation_id) conversationId = data.conversation_id;

    if (data.error) {
      addMsg('system', `❌ Agent error: ${data.error}`);
      statusEl.textContent = '❌ Помилка агента';
      sendBtn.disabled = false;
      return;
    }

    const agentText = data.final_text || data.message || '(пустий відповідь)';
    addMsg('agent', agentText, data);
    history.push({ role: 'agent', text: agentText });

    statusEl.textContent = `✅ Готовий (${elapsed}с) · Conv #${conversationId || '?'}`;
    statusEl.className = 'status online';

  } catch (e) {
    hideTyping();
    addMsg('system', `❌ Помилка з'єднання: ${e.message}`);
    statusEl.textContent = '❌ Помилка';
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function clearChat() {
  chatEl.innerHTML = '';
  history = [];
  sessionId = 'test_' + Date.now();
  conversationId = null;
  addMsg('system', '💬 Новий діалог. Створено нову сесію — в CRM з\'явиться новий клієнт.');
}

// Init
addMsg('system', '💬 Тестовий чат з повною інтеграцією в CRM. Повідомлення та відповіді зберігаються в базу.');
addMsg('system', '⚙️ Вставте Agent API Token, введіть ім\'я клієнта і починайте писати.');
addMsg('system', '📌 Відкрийте CRM щоб бачити діалог у реальному часі.');
inputEl.focus();
</script>
</body>
</html>
