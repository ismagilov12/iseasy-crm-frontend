<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS EASY Agent Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.hdr{background:#1e293b;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
.hdr h1{font-size:17px;color:#818cf8}
.badge{background:#4f46e5;color:#fff;font-size:11px;padding:2px 8px;border-radius:12px}
.st{margin-left:auto;font-size:12px;color:#64748b}
.cfg{background:#1e293b;padding:8px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155;font-size:12px;flex-wrap:wrap}
.cfg label{color:#94a3b8}
.cfg input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:5px 10px;border-radius:6px;font-size:12px}
.cfg button{background:none;border:1px solid #334155;color:#94a3b8;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px}
#ch{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.m{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.u{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:4px}
.a{align-self:flex-start;background:#1e293b;border:1px solid #334155;border-bottom-left-radius:4px}
.sy{align-self:center;background:#334155;color:#94a3b8;font-size:11px;padding:6px 14px;border-radius:10px}
.lb{font-size:10px;color:#818cf8;font-weight:600;margin-bottom:4px}
.mt{margin-top:6px;font-size:10px;color:#475569;display:flex;gap:10px;flex-wrap:wrap}
.ib{background:#1e293b;padding:14px 20px;display:flex;gap:10px;border-top:1px solid #334155}
.ib input{flex:1;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:12px 16px;border-radius:12px;font-size:14px;outline:none}
.ib input:focus{border-color:#4f46e5}
.ib button{background:#4f46e5;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.ib button:disabled{background:#475569;cursor:not-allowed}
</style>
</head>
<body>
<div class="hdr"><h1>IS EASY AI Agent</h1><span class="badge">TEST</span><span class="st" id="st">Ready</span></div>
<div class="cfg">
  <label>Token:</label><input id="tk" value="c225d45f0f88ba5aa9ddb24458fba03ca7952c1f99ba9dbcaca0e309ada94420" style="width:240px">
  <label>Name:</label><input id="cn" value="Test Client" style="width:120px">
  <button onclick="nc()">New</button>
</div>
<div id="ch"></div>
<div class="ib">
  <input id="inp" placeholder="Write as customer..." onkeydown="if(event.key==='Enter')go()">
  <button id="sb" onclick="go()">Send</button>
</div>
<script>
var API="https://iseasy-crm-api.vercel.app";
var ch=document.getElementById("ch"),inp=document.getElementById("inp"),sb=document.getElementById("sb"),st=document.getElementById("st");
var sid="t_"+Date.now();

function am(r,t,x){
  var d=document.createElement("div");d.className="m "+r;
  if(r==="a"){
    var v="<div class=lb>AI Agent</div>"+t.replace(/\n/g,"<br>");
    if(x){v+="<div class=mt>";
      if(x.conversation_id)v+="<span>Conv #"+x.conversation_id+"</span>";
      if(x.turns_used)v+="<span>"+x.turns_used+" turns</span>";
      if(x.usage)v+="<span>"+(x.usage.input_tokens||0)+"/"+(x.usage.output_tokens||0)+" tok</span>";
      v+="</div>";}
    d.innerHTML=v;
  }else d.textContent=t;
  ch.appendChild(d);ch.scrollTop=ch.scrollHeight;
}

function go(){
  var t=inp.value.trim();if(!t)return;
  var tk=document.getElementById("tk").value.trim();
  if(!tk){am("sy","Enter token");return;}
  var cn=document.getElementById("cn").value.trim()||"Test";
  inp.value="";am("u",t);sb.disabled=true;st.textContent="Thinking...";st.style.color="#64748b";
  fetch(API+"/api/agent/chat",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},
    body:JSON.stringify({prompt:"Customer message in Instagram DM from "+cn+": "+t+"\n\nReply as IS EASY brand representative.",max_turns:6})})
  .then(function(r){
    if(!r.ok)return r.text().then(function(e){am("sy","Error "+r.status+": "+e);sb.disabled=false;st.textContent="Error";});
    return r.json().then(function(d){
      if(d.error){am("sy","Error: "+(d.error||d.detail));sb.disabled=false;st.textContent="Error";return;}
      am("a",d.final_text||"(empty)",d);sb.disabled=false;st.textContent="Ready";st.style.color="#4ade80";inp.focus();
    });
  })
  .catch(function(e){am("sy","Error: "+e.message);sb.disabled=false;st.textContent="Error";});
}

function nc(){ch.innerHTML="";sid="t_"+Date.now();am("sy","New dialog started");}
am("sy","Test chat. Write as customer, agent replies via Claude API.");
inp.focus();
</script>
</body>
</html>
