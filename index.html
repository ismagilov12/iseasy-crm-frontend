  /* ═══ RIGHT PANEL ═══ */
  const RightPanel=()=>{if(!conv)return null;const orders=conv.orders||[];

      <div style={{padding:16,borderBottom:`1px solid ${T.border}`,background:T.surface}}>

        <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>toggleClOpen()}><Av name={conv.name} size={50} check={!!conv.cd}/><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{conv.cd&&(conv.cd.surname||conv.cd.name)?(conv.cd.surname||"")+" "+(conv.cd.name||""):conv.name||conv.username||"?"}</div><div style={{fontSize:12,color:T.primary,fontWeight:500}}>@{conv.username}</div></div><span style={{fontSize:12,color:T.textSec,transition:"transform .2s",transform:clOpen?"rotate(180deg)":"rotate(0)"}}>{"\u25BC"}</span></div>

            <React.Fragment key={i}><span style={{color:T.textSec,fontWeight:500}}>{k}</span>{f?<input value={(v||"").replace("№","")} onChange={e=>updateClient(f,e.target.value)} style={{border:"none",borderBottom:`1px solid ${T.border}`,fontSize:13,outline:"none",padding:"2px 0",background:"transparent"}}/>:<span>{v}</span>}</React.Fragment>)}
        </div>}
        {!conv.cd&&det&&<button onClick={()=>mkClient(det)} style={{width:"100%",marginTop:10,padding:"9px",background:T.primary,color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:600,cursor:"pointer",fontSize:12}}>Створити клієнта</button>}
      </div>
      {/* ORDERS */}
      <div style={{padding:16,borderBottom:`1px solid ${T.border}`,background:T.surface}}>

        {orders.map(o=>{const st=ORDER_STATUSES.find(s=>s.id===o.status);return <div key={o.id} style={{background:T.surfaceAlt,borderRadius:12,padding:12,border:`1px solid ${T.border}`,marginBottom:8}}>

            <div style={{width:38,height:38,borderRadius:10,background:T.surface,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{o.type==="repair"?"🔧":o.type==="exchange"?"🔄":"👟"}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{o.product?.name}</div><div style={{color:T.textSec,fontSize:11}}>{o.product?.sku} | р.{o.size}</div></div>
            <button onClick={()=>removeOrder(o.id)} style={{padding:"3px 8px",background:T.dangerLight,border:"1px solid #fecaca",borderRadius:8,fontSize:10,cursor:"pointer",color:T.danger}}>✕</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontWeight:700,fontSize:15}}>{o.total} грн</span>
            <select value={o.status} onChange={e=>updateOrder(o.id,{status:e.target.value})} style={{padding:"3px 8px",borderRadius:8,fontSize:11,fontWeight:600,border:`1px solid ${T.border}`,background:st?.color+"12",color:st?.color,outline:"none",cursor:"pointer"}}>
              {ORDER_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          {o.ttn&&<div style={{fontSize:11,color:T.textSec,marginBottom:2}}>ТТН: {o.ttn}</div>}
          {o.npStatus&&<div style={{fontSize:11,marginBottom:2}}><Badge label={NP_STATUSES[o.npStatus]?.label} color={NP_STATUSES[o.npStatus]?.color}/> {o.daysAtPost>0&&<span style={{color:T.danger,fontWeight:700}}>{o.daysAtPost} дн. на пошті</span>}</div>}

          <div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
            {!o.ttn&&o.status!=="exchange"&&o.status!=="repair"&&<button onClick={()=>mkTTN(o.id)} disabled={!conv.cd} style={{padding:"4px 10px",background:conv.cd?"#dc2626":"#e5e5e5",color:conv.cd?"#fff":"#999",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:conv.cd?"pointer":"not-allowed"}}>📦 ТТН</button>}
            {o.type==="order"&&o.status!=="exchange"&&o.status!=="repair"&&<button onClick={()=>startExchange(o.id)} style={{padding:"4px 10px",background:"#f97316",color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔄 Обмін</button>}
            {o.type==="order"&&o.status!=="exchange"&&o.status!=="repair"&&<button onClick={()=>{setOrderTypeModal("repair");setRepairNote("");setReturnTtn("");}} style={{padding:"4px 10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔧 Ремонт</button>}
          </div>

            <input placeholder="ТТН повернення клієнта" value={o.returnTtn} onChange={e=>updateOrder(o.id,{returnTtn:e.target.value})} style={{width:"100%",marginTop:6,padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,outline:"none"}}/>
            {o.returnTtn&&<button onClick={()=>{updateOrder(o.id,{npStatus:"return_stock"});noti("Товар в обробці повернення");}} style={{marginTop:6,padding:"4px 12px",background:"#f97316",color:"#fff",border:"none",borderRadius:8,fontSize:11,cursor:"pointer"}}>Підтвердити повернення</button>}
          </div>}

            <b>Ремонт:</b> {o.repairNote||"—"}<br/>
            <input placeholder="ТТН від клієнта" value={o.returnTtn} onChange={e=>updateOrder(o.id,{returnTtn:e.target.value})} style={{width:"100%",marginTop:6,padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,outline:"none"}}/>
            <div style={{display:"flex",gap:5,marginTop:6}}>
              <button onClick={()=>{updateOrder(o.id,{status:"production"});noti("Відправлено на виробництво");}} style={{padding:"4px 12px",background:T.warn,color:"#fff",border:"none",borderRadius:8,fontSize:11,cursor:"pointer"}}>🏭 На виробництво</button>
              <button onClick={()=>{const ttn="2045"+String(Math.floor(Math.random()*9999999999)).padStart(10,"0");updateOrder(o.id,{ttn,status:"shipped",npStatus:"in_transit"});send("Ваша пара після ремонту готова! ТТН: "+ttn+". Відправимо найближчим часом.");noti("Ремонт завершено, ТТН створено");}} style={{padding:"4px 12px",background:T.accent,color:"#fff",border:"none",borderRadius:8,fontSize:11,cursor:"pointer"}}>✅ Готово</button>
            </div>
          </div>}
        </div>})}
        {!orders.length&&<div style={{color:T.textSec,fontSize:12,textAlign:"center",padding:14}}>Немає замовлень</div>}
      </div>
      {/* PAYMENT */}
      <div style={{padding:16,borderBottom:`1px solid ${T.border}`,background:T.surface}}>
        <div style={{fontSize:10,fontWeight:700,color:T.textSec,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Оплата</div>
        {curOrder&&<div style={{marginBottom:10,padding:"8px 12px",background:curOrder.paid>=curOrder.total?T.accentLight:T.warnLight,borderRadius:10,fontSize:13}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>Оплачено:</span><span style={{fontWeight:700}}>{curOrder.paid||0}/{curOrder.total} грн</span></div>
          <div style={{background:T.border,borderRadius:4,height:6,marginTop:6,overflow:"hidden"}}><div style={{background:curOrder.paid>=curOrder.total?T.accent:T.warn,height:"100%",width:Math.min(100,((curOrder.paid||0)/curOrder.total)*100)+"%",borderRadius:4,transition:"width .3s"}}/></div>
        </div>}
        {autoP&&curOrder&&curOrder.paid<curOrder.total&&<div style={{background:T.primaryLight,border:"1px solid #c7d2fe",borderRadius:12,padding:10,marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.primary,marginBottom:4}}>Знайдено:</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12}}><span className="badge" style={{background:autoP.src==="mono"?"#1a1a1a":"#7e3af2",color:"#fff"}}>{autoP.src==="mono"?"MONO":"WFP"}</span> {autoP.name} — {autoP.amount}грн</span>
            <button onClick={()=>matchPay(autoP.id,curOrder.id)} style={{padding:"5px 12px",background:T.accent,color:"#fff",border:"none",borderRadius:8,fontWeight:600,cursor:"pointer",fontSize:11}}>✓</button></div></div>}
      </div>

        <div style={{background:T.dangerLight,borderRadius:12,padding:12,border:"1px solid #fecaca"}}>
          {[["Відправник",npSettings.senderName+" | "+npSettings.senderCity+" відд.№"+npSettings.senderBranch],["Отримувач",conv.cd?(conv.cd.surname||"")+" "+(conv.cd.name||""):"—"],["Тел",conv.cd?.phone||"—"],["Місто",conv.cd?.city||"—"],["Відд.",conv.cd?.branch?"№"+conv.cd.branch:"—"],["Контроль",curOrder?(curOrder.paid>=curOrder.total?"Передплата":(curOrder.total-(curOrder.paid||0))+" грн наклад."):"—"]].map(([k,v],i)=>
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}><span style={{color:"#991b1b",fontWeight:500}}>{k}:</span><span style={{fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v}</span></div>)}
          {curOrder?.npStatus&&<div style={{marginTop:8,padding:"6px 10px",borderRadius:8,fontSize:12,fontWeight:600,textAlign:"center",background:NP_STATUSES[curOrder.npStatus]?.color+"18",color:NP_STATUSES[curOrder.npStatus]?.color}}>{NP_STATUSES[curOrder.npStatus]?.label} {curOrder.ttn&&"| ТТН: "+curOrder.ttn} {curOrder.daysAtPost>0&&" | "+curOrder.daysAtPost+" дн."}</div>}
        </div>
      </div>

  const ChatList=({full})=><div style={{display:"flex",flexDirection:"column",background:T.surface,height:"100%",width:full?"100%":320,flexShrink:0,borderRight:full?"none":`1px solid ${T.border}`}} onTouchStart={isMobile?handleTouchStart:undefined} onTouchEnd={isMobile?handleTouchEnd:undefined}>

        {[{id:"all",l:"Усі",c:T.text,n:convs.length},{id:"unanswered",l:"❗",c:T.danger,n:unanswered},...FNL.slice(0,6).map(f=>({id:f.id,l:f.icon,c:f.color,n:counts[f.id]||0}))].map(f=>

          {products.map(p=><div key={p.id} onClick={()=>setProdSaveSelect(prev=>{const n=new Set(prev);if(n.has(p.id))n.delete(p.id);else n.add(p.id);return n;})} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",cursor:"pointer",borderRadius:10,marginBottom:4,background:prodSaveSelect.has(p.id)?T.primaryLight:T.surfaceAlt,border:prodSaveSelect.has(p.id)?`2px solid ${T.primary}`:`2px solid transparent`,transition:"all .15s"}}>
            <div style={{width:20,height:20,borderRadius:6,border:prodSaveSelect.has(p.id)?`2px solid ${T.primary}`:`2px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",background:prodSaveSelect.has(p.id)?T.primary:"#fff",flexShrink:0}}>{prodSaveSelect.has(p.id)&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}</div>
            <div style={{width:36,height:36,borderRadius:8,overflow:"hidden",flexShrink:0,background:T.border}}>{p.img?<img src={p.img} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}>👟</span>}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div><div style={{fontSize:11,color:T.textSec}}>{p.sku} · {p.price}₴</div></div>
          </div>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setProdSaveSelect(null)} style={{padding:"11px 20px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.btnRadius,cursor:"pointer",fontWeight:500}}>Скасувати</button>
          <button disabled={prodSaveSelect.size===0} onClick={()=>{const selected=products.filter(p=>prodSaveSelect.has(p.id));saveProductsToDB(selected);setProdSaveSelect(null);}} style={{flex:1,padding:"11px 20px",background:prodSaveSelect.size>0?T.accent:"#ccc",color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:700,cursor:prodSaveSelect.size>0?"pointer":"not-allowed",fontSize:14}}>💾 Зберегти {prodSaveSelect.size} товарів</button>
        </div>
      </div>
    </div>}
  </div>;
}
/* ═══ LOGIN SCREEN ═══ */
function LoginScreen({onLogin}){
  const[login,setLogin]=useState("");const[pass,setPass]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const doLogin=()=>{setLoading(true);setErr("");setTimeout(()=>{if(login.trim().toLowerCase()==="iseasy"&&pass==="iseasy94"){try{window.sessionStorage.setItem("ie_auth","1");}catch(e){}onLogin();}else{setErr("Невірний логін або пароль");setLoading(false);}},400);};
  return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#f0ede6 0%,#e8e4db 50%,#ddd8cc 100%)",padding:20}}>
    <div style={{background:"#fff",borderRadius:24,padding:"40px 32px",width:380,maxWidth:"100%",boxShadow:"0 12px 48px rgba(0,0,0,.1)",animation:"fadeIn .4s ease"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:"-0.02em",marginBottom:4}}>IS EASY</div>
        <div style={{display:"inline-block",fontSize:10,background:"#4f46e5",color:"#fff",padding:"3px 12px",borderRadius:6,fontWeight:700,letterSpacing:1}}>CRM</div>
        <div style={{marginTop:12,fontSize:13,color:"#8a8578"}}>Вхід до системи</div>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:12,fontWeight:600,color:"#8a8578",display:"block",marginBottom:4}}>Логін</label>
        <input value={login} onChange={e=>{setLogin(e.target.value);setErr("");}} onKeyDown={e=>{if(e.key==="Enter")doLogin();}} placeholder="Введіть логін" autoFocus style={{width:"100%",padding:"12px 16px",border:"1px solid #eae7e0",borderRadius:12,fontSize:16,outline:"none",background:"#faf8f5"}}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{fontSize:12,fontWeight:600,color:"#8a8578",display:"block",marginBottom:4}}>Пароль</label>
        <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} onKeyDown={e=>{if(e.key==="Enter")doLogin();}} placeholder="Введіть пароль" style={{width:"100%",padding:"12px 16px",border:"1px solid #eae7e0",borderRadius:12,fontSize:16,outline:"none",background:"#faf8f5"}}/>
      </div>
      {err&&<div style={{color:"#ef4444",fontSize:13,fontWeight:600,marginBottom:12,textAlign:"center"}}>{err}</div>}
      <button onClick={doLogin} disabled={loading} style={{width:"100%",padding:"13px",background:loading?"#999":"#4f46e5",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:loading?"not-allowed":"pointer",boxShadow:"0 4px 16px rgba(79,70,229,.3)",transition:"all .2s"}}>{loading?"Вхід...":"Увійти"}</button>
    </div>
  </div>;
}

function Root(){
  const[authed,setAuthed]=useState(()=>{try{return window.sessionStorage.getItem("ie_auth")==="1";}catch(e){return false;}});
  if(!authed)return <LoginScreen onLogin={()=>setAuthed(true)}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
</body>
