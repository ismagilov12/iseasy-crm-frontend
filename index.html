function parseCD(t){if(!t||t.length<8)return null;t=t.replace(/\s+/g," ").trim();
  const phM=t.match(/(?:\+?38)?[\s-]?0[\s-]?\d{2}[\s-]?\d{3}[\s-]?\d{2}[\s-]?\d{2}|(?:\+?38)?[\s-]?0\d{9}|\+?380\d{9}/);const phone=phM?phM[0].replace(/[\s-]/g,""):"";
  const brRe=/(?:від(?:ділення|діл)|отделение|отдел|відд\.?|пошт\.?|нп|НП|№)\s*[#№]?(\d{1,4})|(\d{1,4})\s*(?:від(?:ділення|діл)|отделение|відд\.?)/i;const brM=t.match(brRe);let branch=brM?(brM[1]||brM[2]):"";
  if(!branch){const numAfterCity=t.match(/[А-ЯІЇЄҐа-яіїєґ]\s+(\d{1,4})\s/);if(numAfterCity&&parseInt(numAfterCity[1])<=999)branch=numAfterCity[1];}
  const cities=["Київ","Киев","Харків","Харьков","Одеса","Одесса","Дніпро","Днепр","Львів","Львов","Запоріжжя","Полтава","Вінниця","Чернігів","Черкаси","Суми","Рівне","Житомир","Тернопіль","Ужгород","Хмельницький","Кропивницький","Луцьк","Маріуполь","Миколаїв","Херсон","Івано-Франківськ","Чернівці","Біла Церква","Кременчук","Мелітополь","Нікополь","Бердянськ","Ковель","Калуш","Коростень","Сміла","Конотоп","Ніжин","Умань","Шостка","Олександрія","Новомосковськ","Павлоград","Бровари","Ірпінь","Буча","Обухів","Вишгород","Фастів","Боярка","Васильків","Славутич"];
  const ciRe=new RegExp("("+cities.join("|")+")","i");const ciM=t.match(ciRe);const city=ciM?ciM[1]:"";
  let nt=t;if(phM)nt=nt.replace(phM[0],"");if(brM)nt=nt.replace(brRe,"");if(ciM)nt=nt.replace(ciRe,"");nt=nt.replace(/від(?:ділення|діл)|отделение|отдел|відд\.?|пошт\.?|нп|НП|№|#/gi,"").replace(/\d{1,4}/,"").replace(/\s+/g," ").trim();
  const nmM=nt.match(/([А-ЯІЇЄҐа-яіїєґ''-]{2,})\s+([А-ЯІЇЄҐа-яіїєґ''-]{2,})/);let surname="",name="";if(nmM){surname=nmM[1];name=nmM[2];}
  if(!surname&&!name){const singleName=nt.match(/([А-ЯІЇЄҐа-яіїєґ''-]{2,})/);if(singleName&&(phone||city))name=singleName[1];}
  if(!((surname||name)||phone||(city&&branch)))return null;if(!phone&&!city&&!branch)return null;return{surname,name,city,branch,phone};}
function clientDisplayName(cd,fallback){if(!cd)return fallback||"—";const s=cd.surname||"";const n=cd.name||"";return(s+" "+n).trim()||cd.phone||fallback||"—";}
function norm(n){return n.toLowerCase().replace(/ё/g,"е").replace(/[ъь]/g,"").replace(/і/g,"и").replace(/ї/g,"и").replace(/є/g,"е").replace(/ґ/g,"г").replace(/[^а-яa-z]/g,"");}
function fuzzy(a,b){const na=norm(a),nb=norm(b);if(!na||!nb)return false;if(na===nb||na.includes(nb)||nb.includes(na))return true;if(Math.abs(na.length-nb.length)>2)return false;let d=0;for(let i=0;i<Math.max(na.length,nb.length);i++){if(na[i]!==nb[i])d++;}return d<=2;}
function useIsMobile(){const[m,setM]=useState(window.innerWidth<=768);useEffect(()=>{const h=()=>setM(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return m;}
function Av({name,size=48,check=false,onClick}){const c=["#f87171","#fb923c","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"][(name||"?").charCodeAt(0)%7];
  return <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg, ${c}, ${c}dd)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.4,fontWeight:700,color:"#fff",flexShrink:0,position:"relative",cursor:onClick?"pointer":"default",boxShadow:`0 2px 8px ${c}40`}}>{(name||"?")[0].toUpperCase()}
    {check&&<div style={{position:"absolute",bottom:-1,right:-1,width:size*.3,height:size*.3,borderRadius:"50%",background:T.accent,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:size*.16,fontWeight:900,lineHeight:1}}>✓</span></div>}</div>;}
function CancelRing({onExpire,onCancel}){const[alive,setAlive]=useState(true);useEffect(()=>{const t=setTimeout(()=>{setAlive(false);onExpire();},5000);return()=>clearTimeout(t);},[]);if(!alive)return null;
  return <div onClick={onCancel} style={{width:36,height:36,position:"relative",cursor:"pointer",flexShrink:0}} title="Скасувати"><svg width="36" height="36" viewBox="0 0 36 36" style={{transform:"rotate(-90deg)"}}><circle cx="18" cy="18" r="15" fill="none" stroke={T.border} strokeWidth="2"/><circle cx="18" cy="18" r="15" fill="none" stroke={T.danger} strokeWidth="2.5" strokeDasharray="94" style={{animation:"countdownRing 5s linear forwards"}}/></svg><span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:T.danger}}>✕</span></div>;}

        {settingsTab==="widgets"&&<div><h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>📦 Нова Пошта</h2>

          {/* 1. API KEY CONNECTION */}

            <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>API ключ Нова Пошта</label>

            </div>
            <p style={{fontSize:11,color:T.textSec,marginBottom:12}}>Отримайте ключ: my.novaposhta.ua → Налаштування → Безпека → API ключ</p>
            <button disabled={npTestLoading||!npSettings.apiKey} onClick={async()=>{
              setNpTestLoading(true);
              try{
                const res=await api("/api/nova-poshta/test-key",{method:"POST",body:JSON.stringify({apiKey:npSettings.apiKey})});
                if(res&&res.ok){
                  setNpSettings(p=>({...p,connected:true}));
                  setNpSenderInfo(res.sender);
                  noti("API ключ працює! Відправник: "+res.sender.description);
                  // Now load full sender info
                  await api("/api/settings/nova_poshta",{method:"PATCH",body:JSON.stringify({...npSettings,apiKey:npSettings.apiKey,connected:true})});
                  const info=await api("/api/nova-poshta/sender-info");
                  if(info)setNpSenderInfo(info);
                }else{noti("Помилка: "+(res?.error||"невірний ключ"));setNpSettings(p=>({...p,connected:false}));}
              }catch(e){noti("Помилка підключення: "+e.message);setNpSettings(p=>({...p,connected:false}));}
              setNpTestLoading(false);
            }} style={{padding:"9px 18px",background:npTestLoading?"#94a3b8":T.primary,color:"#fff",border:"none",borderRadius:T.btnRadius,fontSize:13,fontWeight:600,cursor:npTestLoading?"wait":"pointer"}}>{npTestLoading?"Перевіряю...":"Перевірити та підключити"}</button>
          </div>

          {/* 2. SENDER SETTINGS */}
          {npSettings.connected&&<div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>👤 Відправник</div>
            {npSenderInfo&&npSenderInfo.counterparties&&npSenderInfo.counterparties.length>0&&<div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>Контрагент</label>
              <select value={npSettings.senderRef||""} onChange={e=>{const ref=e.target.value;const cp=npSenderInfo.counterparties.find(c=>c.Ref===ref);setNpSettings(p=>({...p,senderRef:ref,senderName:cp?.Description||p.senderName}));}} style={{width:"100%",padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}>
                <option value="">Оберіть контрагента</option>
                {npSenderInfo.counterparties.map(cp=><option key={cp.Ref} value={cp.Ref}>{cp.Description}</option>)}
              </select>
            </div>}
            {npSenderInfo&&npSenderInfo.addresses&&npSenderInfo.addresses.length>0&&<div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>Адреса відправки</label>
              <select value={npSettings.senderAddressRef||""} onChange={e=>{const ref=e.target.value;const addr=npSenderInfo.addresses.find(a=>a.Ref===ref);setNpSettings(p=>({...p,senderAddressRef:ref,senderCityRef:addr?.CityRef||"",senderCity:addr?.CityDescription||"",senderBranch:addr?.Description||""}));}} style={{width:"100%",padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}>
                <option value="">Оберіть адресу</option>
                {npSenderInfo.addresses.map(a=><option key={a.Ref} value={a.Ref}>{a.Description}</option>)}
              </select>
            </div>}
            {npSenderInfo&&npSenderInfo.contacts&&npSenderInfo.contacts.length>0&&<div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>Контактна особа</label>
              <select value={npSettings.senderContactRef||""} onChange={e=>{const ref=e.target.value;const ct=npSenderInfo.contacts.find(c=>c.Ref===ref);setNpSettings(p=>({...p,senderContactRef:ref,senderPhone:ct?.Phones||p.senderPhone}));}} style={{width:"100%",padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}>
                <option value="">Оберіть контакт</option>
                {npSenderInfo.contacts.map(c=><option key={c.Ref} value={c.Ref}>{c.Description} ({c.Phones})</option>)}

            </div>
            <div style={{display:"flex",gap:14,marginTop:10}}>
              {[["Контроль оплати","controlPay"],["Наложка","cashOnDelivery"]].map(([l,k])=>
                <label key={k} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={!!npSettings[k]} onChange={e=>setNpSettings(p=>({...p,[k]:e.target.checked}))}/>{l}</label>)}

            <button onClick={async()=>{
              await api("/api/settings/nova_poshta",{method:"PATCH",body:JSON.stringify(npSettings)});

          </div>}

          {/* 3. TRACK PARCEL */}
          {npSettings.connected&&<div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>🔍 Відстеження посилки</div>
            <div style={{display:"flex",gap:8}}>
              <input value={npTrackInput} onChange={e=>setNpTrackInput(e.target.value)} placeholder="Введіть номер ТТН" style={{flex:1,padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}/>
              <button onClick={async()=>{
                if(!npTrackInput.trim())return;
                try{const res=await api("/api/nova-poshta/track",{method:"POST",body:JSON.stringify({ttn:npTrackInput.trim()})});
                  if(res&&res.length>0){setNpTrackResult(res[0]);noti("Статус: "+res[0].status);}
                  else noti("ТТН не знайдено");
                }catch(e){noti("Помилка: "+e.message);}
              }} style={{padding:"10px 18px",background:T.primary,color:"#fff",border:"none",borderRadius:T.btnRadius,fontSize:13,fontWeight:600,cursor:"pointer"}}>Знайти</button>
            </div>
            {npTrackResult&&<div style={{marginTop:14,padding:14,background:T.surfaceAlt,borderRadius:12,border:`1px solid ${T.border}`}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:parseInt(npTrackResult.statusCode)>=7?"#10b981":parseInt(npTrackResult.statusCode)>=4?"#f59e0b":"#6366f1"}}>{npTrackResult.status}</div>
              {[["ТТН",npTrackResult.ttn],["Отримувач",npTrackResult.recipientName],["Місто",npTrackResult.cityRecipient],["Відділення",npTrackResult.warehouseRecipient],["Планова доставка",npTrackResult.scheduledDelivery],["Факт. доставка",npTrackResult.actualDelivery],["Вага",npTrackResult.weight&&npTrackResult.weight+"кг"],["Зворотня доставка",npTrackResult.redeliverySum&&npTrackResult.redeliverySum+"грн"],["Зберігання",npTrackResult.daysInStorage&&npTrackResult.daysInStorage+" дн."]].filter(([,v])=>v).map(([k,v],i)=>
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}><span style={{color:T.textSec}}>{k}:</span><span style={{fontWeight:500}}>{v}</span></div>)}
            </div>}
          </div>}

          {/* 4. SEARCH WAREHOUSES */}
          {npSettings.connected&&<div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>🏤 Пошук відділень</div>

              <button onClick={async()=>{
                if(!npCitySearch.trim())return;

              }} style={{padding:"10px 14px",background:T.primary,color:"#fff",border:"none",borderRadius:T.btnRadius,fontSize:13,fontWeight:600,cursor:"pointer"}}>🔍</button>
            </div>
            {npCities.length>0&&<div style={{marginBottom:10}}>
              {npCities.slice(0,8).map((c,i)=><div key={i} onClick={async()=>{
                setNpCitySearch(c.name);setNpCities([]);

              }} style={{padding:"8px 12px",cursor:"pointer",fontSize:13,borderBottom:`1px solid ${T.border}`,background:T.surfaceAlt,borderRadius:i===0?`${T.cardRadius} ${T.cardRadius} 0 0`:i===Math.min(7,npCities.length-1)?`0 0 ${T.cardRadius} ${T.cardRadius}`:"0"}} className="hover">{c.present||c.name}</div>)}
            </div>}
            {npWarehouses.length>0&&<div>
              <input value={npWhSearch} onChange={e=>setNpWhSearch(e.target.value)} placeholder="Фільтр відділень..." style={{width:"100%",padding:"8px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:12,outline:"none",background:T.surfaceAlt,marginBottom:8}}/>
              <div style={{maxHeight:250,overflowY:"auto",border:`1px solid ${T.border}`,borderRadius:12}}>

              </div>
            </div>}
          </div>}

          {/* 5. CONNECTION STATUS */}

            <span style={{fontSize:40,display:"block",marginBottom:12}}>📦</span>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Підключіть Нова Пошта</div>
            <p style={{color:T.textSec,fontSize:13}}>Вставте API ключ вище, щоб створювати ТТН, відстежувати посилки та шукати відділення прямо з CRM</p>
          </div>}
        </div>}
        {settingsTab==="team"&&<div><h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Команда</h2><p style={{color:T.textSec}}>В розробці</p></div>}
        {settingsTab==="bot"&&<div><h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Бот-налаштування</h2><p style={{color:T.textSec}}>В розробці</p></div>}
      </div>
    </div>
  </div>;

  if(page==="orders") return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}><Header/><OrdersPage/></div>;
  if(page==="products") return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}><Header/><ProductsPage/></div>;
  if(page==="analytics") return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}><Header/><AnalyticsPage/></div>;

  if(page==="comments") return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}><Header/>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{fontSize:22,fontWeight:800}}>📸 Коментарі Instagram</h2>
        <button onClick={()=>{api("/api/comments").then(c=>{if(c)setComments(c);noti("Оновлено");});}} style={{padding:"8px 18px",borderRadius:T.btnRadius,background:T.primary,color:"#fff",border:"none",fontWeight:600,fontSize:13,cursor:"pointer"}}>Оновити</button>
      </div>
      {comments.length===0?<div style={{textAlign:"center",padding:60,color:T.textSec}}><span style={{fontSize:52,display:"block",marginBottom:16}}>📸</span><p style={{fontSize:16,fontWeight:500}}>Ще немає коментарів</p><p style={{fontSize:13,marginTop:8}}>Коментарі до постів Instagram будуть відображатись тут автоматично</p></div>:
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {comments.map(c=><div key={c.id} className="card" style={{padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <Av name={c.username||"?"} size={36}/>
            <div style={{flex:1}}>
              <span style={{fontWeight:700,fontSize:14}}>@{c.username||"невідомий"}</span>
              {c.is_reply&&<span className="badge" style={{marginLeft:8,background:T.primaryLight,color:T.primary,fontSize:10}}>відповідь</span>}
              <div style={{fontSize:11,color:T.textSec}}>{c.created_at?new Date(c.created_at).toLocaleString("uk",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>
            {!c.is_reply&&<button onClick={()=>{setCommentReply(c);setCommentReplyText("");}} style={{padding:"6px 14px",borderRadius:T.btnRadius,background:T.primaryLight,color:T.primary,border:"none",fontWeight:600,fontSize:12,cursor:"pointer"}}>Відповісти</button>}
          </div>
          <p style={{fontSize:14,lineHeight:1.5,color:T.text}}>{c.text}</p>
          {commentReply&&commentReply.id===c.id&&<div style={{marginTop:12,display:"flex",gap:8}}>
            <input value={commentReplyText} onChange={e=>setCommentReplyText(e.target.value)} placeholder="Ваша відповідь..." style={{flex:1,padding:"8px 14px",borderRadius:T.inputRadius,border:`1px solid ${T.border}`,fontSize:13,outline:"none"}}/>
            <button onClick={()=>{if(!commentReplyText.trim())return;api("/api/comments/"+c.instagram_comment_id+"/reply",{method:"POST",body:JSON.stringify({text:commentReplyText})}).then(()=>{noti("Відповідь надіслано!");setCommentReply(null);setCommentReplyText("");api("/api/comments").then(cmts=>{if(cmts)setComments(cmts);});});}} style={{padding:"8px 18px",borderRadius:T.btnRadius,background:T.primary,color:"#fff",border:"none",fontWeight:600,fontSize:13,cursor:"pointer"}}>↑</button>
            <button onClick={()=>setCommentReply(null)} style={{padding:"8px 14px",borderRadius:T.btnRadius,background:T.surfaceAlt,color:T.textSec,border:`1px solid ${T.border}`,fontWeight:600,fontSize:13,cursor:"pointer"}}>✕</button>
          </div>}
        </div>)}
      </div>}
    </div>
  </div>;

  /* ═══ CRM PAGE ═══ */
  return <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",position:"relative",background:T.bg}} className={repair?"repair-mode":""} onContextMenu={handleRepairClick}>
    <Header/>
    {notif&&<div style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",background:T.text,color:"#fff",padding:"12px 28px",borderRadius:14,fontSize:14,fontWeight:600,zIndex:200,boxShadow:T.shadowLg,animation:"fadeIn .2s ease"}}>{notif}</div>}
    {repair&&pins.map((pin,i)=><div key={pin.id} className="repair-pin" style={{left:pin.x,top:pin.y}} title={pin.text}>{i+1}</div>)}
    {repair&&<div style={{background:T.warnLight,borderBottom:"2px solid #eab308",padding:"10px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,flexWrap:"wrap",gap:6}}>

      <div style={{display:"flex",gap:6,marginTop:8}}><button onClick={savePin} style={{padding:"6px 14px",background:T.primary,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>Додати</button><button onClick={()=>setPinInput(null)} style={{padding:"6px 14px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12,cursor:"pointer"}}>✕</button></div>

    {isMobile?<div style={{flex:1,overflow:"hidden",display:"flex"}}>
      {mobileView==="list"&&<ChatList full/>}

      {mobileView==="client"&&conv&&<div style={{width:"100%",display:"flex",flexDirection:"column",height:"100%"}} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
        <div className="glass" style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>

    </div>:<div style={{flex:1,display:"flex",overflow:"hidden"}}>
      <ChatList/>
      <ChatArea/>
      {conv&&<div style={{width:340,borderLeft:`1px solid ${T.border}`,display:"flex",flexDirection:"column",flexShrink:0}}><RightPanel/></div>}
    </div>}

    {/* SOS */}
    {sosOpen&&<div style={{position:"fixed",top:56,right:isMobile?8:60,width:isMobile?"calc(100% - 16px)":380,height:isMobile?"calc(100vh - 66px)":480,background:T.surface,borderRadius:20,boxShadow:T.shadowLg,zIndex:300,display:"flex",flexDirection:"column",overflow:"hidden",border:`1px solid ${T.border}`,animation:"slideDown .25s ease"}}>
      <div style={{padding:"14px 18px",background:"linear-gradient(135deg,#7c3aed,#ec4899)",color:"#fff",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}><b style={{fontSize:14}}>🤖 AI Асистент</b><span onClick={()=>setSosOpen(false)} style={{cursor:"pointer",fontSize:16}}>✕</span></div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8,background:T.surfaceAlt}}>

        {sosTyp&&<div style={{display:"flex",gap:4,padding:10}}>{[0,.2,.4].map(d=><div key={d} style={{width:6,height:6,borderRadius:"50%",background:T.textSec,animation:`pulse 1s infinite ${d}s`}}/>)}</div>}

      </div>
      <div style={{padding:"8px 12px",borderTop:`1px solid ${T.border}`,display:"flex",gap:8,flexShrink:0,background:T.surface}}>
        <input value={sosIn} onChange={e=>setSosIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sosProc(sosIn);}} placeholder="Команда..." style={{flex:1,padding:"8px 14px",border:`1px solid ${T.border}`,borderRadius:20,fontSize:13,outline:"none",background:T.surfaceAlt}}/>
        <button onClick={()=>sosProc(sosIn)} style={{width:34,height:34,borderRadius:"50%",background:"#7c3aed",color:"#fff",border:"none",cursor:"pointer",fontSize:14,boxShadow:"0 2px 8px rgba(124,58,237,.3)"}}>➤</button>
      </div>
    </div>}

    {/* REPAIR MODAL */}
    {orderTypeModal==="repair"&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
      <div style={{background:T.surface,borderRadius:20,padding:28,width:420,maxWidth:"100%",boxShadow:T.shadowLg,animation:"fadeIn .2s ease"}}>
        <h3 style={{marginBottom:14,fontSize:18}}>🔧 Ремонт</h3>
        <p style={{fontSize:13,color:T.textSec,marginBottom:14}}>Опишіть що потрібно виправити. Нагадаємо клієнту що пара має бути чистою.</p>
        <textarea value={repairNote} onChange={e=>setRepairNote(e.target.value)} placeholder="Коментар по ремонту..." style={{width:"100%",padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",resize:"none",minHeight:60,marginBottom:10,background:T.surfaceAlt}}/>
        <div style={{display:"flex",gap:10}}><button onClick={()=>setOrderTypeModal(null)} style={{padding:"10px 18px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.btnRadius,cursor:"pointer",fontWeight:500}}>Скасувати</button>
          <button onClick={()=>{if(curOrder)startRepair(curOrder.id,repairNote);setOrderTypeModal(null);}} style={{padding:"10px 18px",background:T.danger,color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:600,cursor:"pointer"}}>Розпочати ремонт</button>
        </div>
      </div>
    </div>}

    {/* PRODUCTION MODAL */}
    {prodReq&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
      <div style={{background:T.surface,borderRadius:20,padding:28,width:460,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:T.shadowLg,animation:"fadeIn .2s ease"}}>
        <h3 style={{marginBottom:14,fontSize:18}}>🏭 Запит на виробництво</h3>
        <div style={{background:T.surfaceAlt,borderRadius:12,padding:16,marginBottom:18,fontSize:13}}>
          <b>Клієнт:</b> {prodReq.conv.cd?.surname} {prodReq.conv.cd?.name}<br/>
          <b>Товар:</b> {prodReq.conv.orders?.[0]?.product?.name} | р.{prodReq.conv.orders?.[0]?.size}<br/>
          <b>Дата:</b> {prodReq.conv.orders?.[0]?.date}
        </div>
        <label style={{fontSize:13,fontWeight:700,display:"block",marginBottom:8}}>📅 Дата готовності:</label>
        <input type="date" value={prodDate} onChange={e=>setProdDate(e.target.value)} style={{width:"100%",padding:"11px 16px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:14,outline:"none",marginBottom:14,background:T.surfaceAlt}}/>
        {prodDate&&prodReq.conv.orders?.[0]?.date&&Math.floor((new Date(prodDate)-new Date(prodReq.conv.orders[0].date))/(86400000))>9&&<div style={{padding:"10px 14px",background:T.dangerLight,border:"1px solid #fecaca",borderRadius:T.btnRadius,marginBottom:14,fontSize:13}}><b style={{color:T.danger}}>⚠️ Більше 9 днів!</b> Бонус -10% (SORRY10)</div>}
        <div style={{display:"flex",gap:10}}><button onClick={()=>{setProdReq(null);setProdDate("");}} style={{padding:"10px 18px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.btnRadius,cursor:"pointer",fontWeight:500}}>Скасувати</button>
          <button onClick={handleProductionConfirm} disabled={!prodDate} style={{flex:1,padding:"10px 18px",background:prodDate?"#7c3aed":"#ccc",color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:600,cursor:prodDate?"pointer":"not-allowed"}}>Підтвердити</button>
        </div>
      </div>
    </div>}

    {/* PRODUCT MODAL */}
    {prodModal&&<div onClick={()=>{setProdModal(null);setSelSize(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surface,borderRadius:20,padding:26,width:400,maxWidth:"100%",boxShadow:T.shadowLg,animation:"fadeIn .2s ease"}}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>Додати товар</div>
        <div style={{display:"flex",gap:16,marginBottom:16}}><div style={{width:68,height:68,borderRadius:14,background:T.surfaceAlt,border:`1px solid ${T.border}`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{prodModal.img?<img src={prodModal.img} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👟"}</div><div><div style={{fontWeight:700}}>{prodModal.name}</div><div style={{color:T.textSec,fontSize:12}}>{prodModal.sku}</div><div style={{fontWeight:700,fontSize:17,marginTop:4,color:T.primary}}>{prodModal.price} грн</div></div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>{(Array.isArray(prodModal.sizes)?prodModal.sizes:typeof prodModal.sizes==="string"?prodModal.sizes.split(",").map(Number):[40,41,42,43,44,45]).map(sz=><div key={sz} onClick={()=>setSelSize(sz)} style={{width:46,height:46,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:selSize===sz?`2px solid ${T.primary}`:`1px solid ${T.border}`,background:selSize===sz?T.primary:T.surface,color:selSize===sz?"#fff":T.text,fontWeight:600,cursor:"pointer",fontSize:14,transition:"all .15s"}}>{sz}</div>)}</div>
        <div style={{display:"flex",gap:8}}><button onClick={()=>{setProdModal(null);setSelSize(null);}} style={{padding:"9px 16px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.btnRadius,cursor:"pointer",fontWeight:500}}>Скасувати</button>
          <button disabled={!selSize} onClick={()=>selSize&&addOrder(prodModal,selSize)} style={{padding:"9px 16px",background:selSize?T.primary:"#ccc",color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:600,cursor:selSize?"pointer":"not-allowed"}}>Додати</button>
        </div>
      </div>
    </div>}

    {/* EDIT CLIENT MODAL */}
    {editClient&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
      <div style={{background:T.surface,borderRadius:20,padding:26,width:420,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:T.shadowLg,animation:"fadeIn .2s ease"}}>
        <h3 style={{marginBottom:14,fontSize:18}}>{conv?.cd?"Редагувати клієнта":"Новий клієнт"}</h3>
        {[["Прізвище","surname"],["Ім'я","name"],["Телефон","phone"]].map(([l,k])=>
          <div key={k} style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>{l}</label>
            <input value={editClient[k]||""} onChange={e=>setEditClient(p=>({...p,[k]:e.target.value}))} style={{width:"100%",padding:"10px 14px",border:`1px solid ${T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}/></div>)}
        {/* NP City search */}
        <div style={{marginBottom:10}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>Місто {editClient.cityRef&&<span style={{color:T.accent,fontSize:10}}>✓ NP</span>}</label>
          <div style={{display:"flex",gap:6}}>
            <input value={editClient.city||""} onChange={e=>{setEditClient(p=>({...p,city:e.target.value,cityRef:"",warehouseRef:"",branch:""}));setEcCityQ(e.target.value);setEcWarehouses([]);
              if(e.target.value.length>=2&&npSettings.connected){api("/api/nova-poshta/cities?q="+encodeURIComponent(e.target.value)).then(r=>{if(r)setEcCities(r);});}else{setEcCities([]);}
            }} placeholder="Почніть вводити місто..." style={{flex:1,padding:"10px 14px",border:`1px solid ${editClient.cityRef?T.accent:T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}/>
          </div>
          {ecCities.length>0&&!editClient.cityRef&&<div style={{border:`1px solid ${T.border}`,borderRadius:10,marginTop:4,maxHeight:150,overflowY:"auto",background:T.surface}}>
            {ecCities.slice(0,6).map((c,i)=><div key={i} onClick={async()=>{
              setEditClient(p=>({...p,city:c.name||c.present,cityRef:c.ref,branch:"",warehouseRef:""}));setEcCities([]);
              try{const whs=await api("/api/nova-poshta/warehouses?city_ref="+c.ref);if(whs)setEcWarehouses(whs);}catch(e){}
            }} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:i<Math.min(5,ecCities.length-1)?`1px solid ${T.borderLight}`:"none"}}>{c.present||c.name}</div>)}
          </div>}
        </div>
        {/* NP Warehouse search */}
        <div style={{marginBottom:10}}>
          <label style={{fontSize:12,fontWeight:600,color:T.textSec,display:"block",marginBottom:4}}>Відділення {editClient.warehouseRef&&<span style={{color:T.accent,fontSize:10}}>✓ NP</span>}</label>
          <input value={editClient.branch||""} onChange={e=>{setEditClient(p=>({...p,branch:e.target.value,warehouseRef:""}));setEcWhQ(e.target.value);}} placeholder={editClient.cityRef?"Введіть номер або назву...":"Спочатку оберіть місто"} disabled={!editClient.cityRef&&!editClient.city} style={{width:"100%",padding:"10px 14px",border:`1px solid ${editClient.warehouseRef?T.accent:T.border}`,borderRadius:T.inputRadius,fontSize:13,outline:"none",background:T.surfaceAlt}}/>
          {editClient.cityRef&&ecWarehouses.length>0&&!editClient.warehouseRef&&<div style={{border:`1px solid ${T.border}`,borderRadius:10,marginTop:4,maxHeight:180,overflowY:"auto",background:T.surface}}>
            {ecWarehouses.filter(w=>{if(!editClient.branch)return true;const q=editClient.branch.toLowerCase().trim();const num=q.replace(/\D/g,"");if(num&&w.number===num)return true;if(num&&w.number&&w.number.startsWith(num))return true;return w.description.toLowerCase().includes(q)||w.shortAddress?.toLowerCase().includes(q)||(w.number&&w.number.includes(num));}).slice(0,15).map((w,i)=><div key={w.ref} onClick={()=>{
              setEditClient(p=>({...p,branch:w.description,warehouseRef:w.ref}));
            }} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:`1px solid ${T.borderLight}`}}><div style={{fontWeight:500}}>{w.description}</div><div style={{color:T.textSec,fontSize:11}}>{w.shortAddress||""}</div></div>)}
          </div>}
          {editClient.cityRef&&ecWarehouses.length===0&&<div style={{fontSize:11,color:T.textSec,marginTop:4,padding:"6px 10px",background:T.surfaceAlt,borderRadius:8,cursor:"pointer"}} onClick={async()=>{if(editClient.cityRef){try{const whs=await api("/api/nova-poshta/warehouses?city_ref="+editClient.cityRef);if(whs)setEcWarehouses(whs);}catch(e){}}}}>🔄 Завантажити відділення</div>}
        </div>
        {!npSettings.connected&&<div style={{fontSize:11,color:T.warn,padding:"8px 12px",background:T.warnLight,borderRadius:8,marginBottom:10}}>⚠️ Підключіть API Нова Пошта в налаштуваннях для пошуку міст та відділень</div>}
        <div style={{display:"flex",gap:10,marginTop:10}}><button onClick={()=>{setEditClient(null);setEcCities([]);setEcWarehouses([]);}} style={{padding:"10px 18px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:T.btnRadius,cursor:"pointer",fontWeight:500}}>Скасувати</button>
          <button onClick={()=>{
            if(!conv?.cd){mkClient(editClient);}else{setConvs(p=>p.map(c=>c.id===selId?{...c,cd:editClient}:c));if(editClient.id)api("/api/clients/"+editClient.id,{method:"PATCH",body:JSON.stringify(editClient)});}
            setEditClient(null);setEcCities([]);setEcWarehouses([]);noti("Збережено!");
          }} style={{flex:1,padding:"10px 18px",background:T.primary,color:"#fff",border:"none",borderRadius:T.btnRadius,fontWeight:600,cursor:"pointer"}}>{conv?.cd?"Зберегти":"Створити"}</button>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
